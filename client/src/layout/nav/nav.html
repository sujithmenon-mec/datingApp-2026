<header class="p-3 w-full z-50 fixed top-0 bg-linear-to-r from-primary to-black">
  <div class="flex align-middle items-center px-10 mx-auto gap-6">
    <div class="text-white">
      <a
        href=""
        routerLink="/"
        routerLinkActive="text-accent"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 max-h-16 border-r-2 border-r-white pr-6"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="size-7"
        >
          <path
            fill-rule="evenodd"
            d="M8.25 6.75a3.75 3.75 0 1 1 7.5 0 3.75 3.75 0 0 1-7.5 0ZM15.75 9.75a3 3 0 1 1 6 0 3 3 0 0 1-6 0ZM2.25 9.75a3 3 0 1 1 6 0 3 3 0 0 1-6 0ZM6.31 15.117A6.745 6.745 0 0 1 12 12a6.745 6.745 0 0 1 6.709 7.498.75.75 0 0 1-.372.568A12.696 12.696 0 0 1 12 21.75c-2.305 0-4.47-.612-6.337-1.684a.75.75 0 0 1-.372-.568 6.787 6.787 0 0 1 1.019-4.38Z"
            clip-rule="evenodd"
          />
          <path
            d="M5.082 14.254a8.287 8.287 0 0 0-1.308 5.135 9.687 9.687 0 0 1-1.764-.44l-.115-.04a.563.563 0 0 1-.373-.487l-.01-.121a3.75 3.75 0 0 1 3.57-4.047ZM20.226 19.389a8.287 8.287 0 0 0-1.308-5.135 3.75 3.75 0 0 1 3.57 4.047l-.01.121a.563.563 0 0 1-.373.486l-.115.04c-.567.2-1.156.349-1.764.441Z"
          />
        </svg>

        <h3 class="text-2xl font-semibold uppercase">Dating App</h3>
      </a>
    </div>
    <nav class="flex gap-3 my-2 uppercase text-lg text-white">
      @if (accountService.currentUser()) {
        <a
          routerLink="/members"
          routerLinkActive="text-accent"
          [routerLinkActiveOptions]="{ exact: true }"
          >Matches</a
        >
        <a routerLink="/lists" routerLinkActive="text-accent">Lists</a>
        <a routerLink="/messages" routerLinkActive="text-accent">Messages</a>
      }
      <a routerLink="/errors" routerLinkActive="text-accent">Errors</a>
    </nav>
    @if(busyService.busyRequestCount() > 0){
      <span class="loading loading-spinner text-accent"></span>
    }
    <div class="flex align-middle ml-auto gap-3">
      <div class="dropdown mr-5 dropdown-end">
        <button
          tabindex="1"
          role="button"
          class="flex flex-col justify-center align-middle text-white cursor-pointer uppercase text-xs"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            class="size-6 flex self-center"
          >
            <path
              fill-rule="evenodd"
              d="M20.599 1.5c-.376 0-.743.111-1.055.32l-5.08 3.385a18.747 18.747 0 0 0-3.471 2.987 10.04 10.04 0 0 1 4.815 4.815 18.748 18.748 0 0 0 2.987-3.472l3.386-5.079A1.902 1.902 0 0 0 20.599 1.5Zm-8.3 14.025a18.76 18.76 0 0 0 1.896-1.207 8.026 8.026 0 0 0-4.513-4.513A18.75 18.75 0 0 0 8.475 11.7l-.278.5a5.26 5.26 0 0 1 3.601 3.602l.502-.278ZM6.75 13.5A3.75 3.75 0 0 0 3 17.25a1.5 1.5 0 0 1-1.601 1.497.75.75 0 0 0-.7 1.123 5.25 5.25 0 0 0 9.8-2.62 3.75 3.75 0 0 0-3.75-3.75Z"
              clip-rule="evenodd"
            />
          </svg>
          <span>{{selectedTheme()}}</span>
        </button>
        <ul
          tabindex="1"
          class="dropdown-content menu bg-base-100 rounded-box z-50 w-52 p-2 shadow-sm"
        >
          @for (theme of themes; track $index) {
            <li><a (click)="handleSelectTheme(theme)">{{theme}}</a></li>
          }
        </ul>
      </div>
      @if (accountService.currentUser(); as user) {
        <div class="dropdown dropdown-end">
          <div
            tabindex="0"
            role="button"
            class="flex items-center text-white text-xl gap-3 cursor-pointer"
          >
            <img
              [src]="user?.imageUrl || '/user.png'"
              alt="user avatar"
              class="w-10 h-10 rounded-full"
            />
            <span>{{ user.displayName }}</span>
          </div>
          <ul
            tabindex="-1"
            class="dropdown-content menu dropdown-end bg-base-100 rounded-box z-1 w-52 p-2 shadow-sm"
          >
            <li><a routerLink="/members/{{user.id}}">Edit profile</a></li>
            <li><a (click)="logOut()">Logout</a></li>
          </ul>
        </div>
      } @else {
        <form #loginForm="ngForm" (ngSubmit)="login()" class="flex items-center gap-3">
          <input
            name="email"
            type="text"
            class="input"
            placeholder="email"
            [(ngModel)]="creds.email"
          />
          <input
            name="password"
            type="password"
            class="input"
            placeholder="Password"
            [(ngModel)]="creds.password"
          />
          <button class="btn" type="submit">Login</button>
        </form>
      }
    </div>
  </div>
</header>
